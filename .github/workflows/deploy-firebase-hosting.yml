# نشر Flutter Web على Firebase Hosting من GitHub (يتجنب مشاكل الشبكة المحلية)
# الملفات في .gitignore (.env و web/firebase-messaging-sw.js) تُنشأ من الأسرار أدناه.
name: Deploy to Firebase Hosting

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # توليد web/firebase-messaging-sw.js من القالب و lib/firebase_options.dart (بدون .env)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate firebase-messaging-sw.js
        run: node scripts/generate-firebase-sw.js

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: >
          flutter build web --release
          --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          --dart-define=SUPABASE_STORAGE_BASE_URL="${{ secrets.SUPABASE_STORAGE_BASE_URL }}"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
